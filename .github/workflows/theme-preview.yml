name: Theme Preview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile --ignore-scripts

      - name: Install PPTX preview rasterizer
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice poppler-utils

      - name: Build packages
        run: corepack pnpm build

      - name: Generate README and theme preview assets
        run: corepack pnpm preview:readme

      - name: Verify committed preview metadata
        run: git diff --exit-code docs/theme-preview/index.html docs/theme-preview/preview-manifest.json docs/theme-preview/theme-preview-evaluation.json

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
