version: "1.0"

operations:
  - op: setLayout
    target:
      title: "Key Features"
    value:
      preset: grid
      columns: 2
      rows: 2
    reason: "Four key features fit a 2x2 grid."

  - op: setLayout
    target:
      title: "Current Approach and Improved Approach"
    value:
      preset: comparison
      direction: horizontal
      columns: 2
    reason: "The current/improved comparison works best as a horizontal comparison."

  - op: setLayout
    target:
      title: "Five Execution Steps"
    value:
      preset: pentagon
      direction: radial
    reason: "Five method items should use the radial pentagon layout."

  - op: setTypography
    target:
      title: "Key Features"
    value:
      bodyFontSize: 21
      minFontSize: 18
