  <g font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">
    <rect x="110" y="250" width="285" height="110" rx="18" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="4"/>
    <text x="252" y="318" fill="#111827">Markdown</text>
    <rect x="505" y="250" width="285" height="110" rx="18" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="4"/>
