<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Markdown semantics slide preview</title>
  <desc id="desc">A generated slide showing structured cards for Markdown semantics.</desc>
  <rect width="1600" height="900" fill="#F9FAFB"/>
  <text x="96" y="115" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#111827">Markdown Semantics</text>
  <rect x="96" y="155" width="210" height="10" rx="5" fill="#047857"/>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="110" y="235" width="640" height="190" rx="20" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="4"/>
    <rect x="110" y="235" width="16" height="190" rx="8" fill="#047857"/>
    <text x="160" y="305" font-size="34" font-weight="800" fill="#047857">Lists</text>
    <text x="160" y="360" font-size="27" fill="#111827">Numbering, nesting, and explanatory</text>
    <text x="160" y="397" font-size="27" fill="#111827">continuation lines stay structured.</text>
    <rect x="850" y="235" width="640" height="190" rx="20" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="4"/>
    <rect x="850" y="235" width="16" height="190" rx="8" fill="#047857"/>
    <text x="900" y="305" font-size="34" font-weight="800" fill="#047857">Emphasis</text>
    <text x="900" y="360" font-size="27" fill="#111827">Bold and italic Markdown becomes</text>
    <text x="900" y="397" font-size="27" fill="#111827">editable rich text in PPTX.</text>
    <rect x="110" y="505" width="640" height="190" rx="20" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="4"/>
    <rect x="110" y="505" width="16" height="190" rx="8" fill="#047857"/>
    <text x="160" y="575" font-size="34" font-weight="800" fill="#047857">Key Messages</text>
    <text x="160" y="630" font-size="27" fill="#111827">Block quotes are separated into</text>
    <text x="160" y="667" font-size="27" fill="#111827">accented callout regions.</text>
    <rect x="850" y="505" width="640" height="190" rx="20" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="4"/>
    <rect x="850" y="505" width="16" height="190" rx="8" fill="#047857"/>
    <text x="900" y="575" font-size="34" font-weight="800" fill="#047857">Diagrams</text>
    <text x="900" y="630" font-size="27" fill="#111827">Arrow pipelines become adaptive</text>
    <text x="900" y="667" font-size="27" fill="#111827">editable node-and-connector slides.</text>
  </g>
</svg>
